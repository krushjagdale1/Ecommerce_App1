apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: kube-system
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush        1
        Daemon       Off
        Log_Level    info

    [INPUT]
        Name   tail
        Path   /var/log/containers/*.log
        Exclude_Path  /var/log/containers/*logstash*,/var/log/containers/*fluent-bit*
        Tag    kube.*
        Refresh_Interval  5

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On

    [OUTPUT]
        Name   tcp
        Match  *
        Host   logstash.default.svc.cluster.local
        Port   5044
        Format json_lines
